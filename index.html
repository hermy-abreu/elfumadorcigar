<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi</title>

<!-- FUENTES -->
<link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">


<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif;
        font-weight: 600;

        /* FONDO COMPLETO */
        background: url('Fondo.png') no-repeat center center fixed;
        background-size: cover;
    }

    .overlay {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 40px;
        position: relative;
    }

    /* LOGO PRINCIPAL */
    .logo {
        width: 70%;
        max-width: 350px;
        margin-top: 35px;
    }

    /* TEXTO CENTRAL */
    .texto-central {
        margin-top: 120px;
        max-width: 80%;
        text-align: center;
        color: white;
        font-size: 24px;
        font-weight: 600;
        line-height: 1.5;
        text-shadow: 0px 0px 8px black;
    }
    .texto-central ol {
        list-style-position: inside;
        padding-left: 0;
        margin: 10px 0 0 0;
    }

    .texto-central li {
        margin-bottom: 8px;
    }
   

    /* ICONO DE INSTAGRAM */
    .icono-ig {
        width: 100px;
        margin-top: 40px;
    }

    /* FIRMA PERSONAL 
.firma {
    position: absolute;
    bottom: 20px;
    right: 20px;
    font-family: 'Parisienne', cursive;
    font-style: italic;
    font-weight: 10;
    font-size: clamp(8px, 0.8vw, 10px);
    color: rgba(255, 255, 255, 0.75);
    text-shadow: 0px 0px 5px black;
}
*/

    /* ----------------------------- */
    /* ⭐ AJUSTES PARA CELULARES ⭐ */
    /* ----------------------------- */
    @media (max-width: 768px) {
        .texto-central{ margin-top: 100;}

        .logo {
            width: 65%;
            max-width: 300px;
        }

        .texto-central {
            margin-top: 60px;
            font-size: 20px;
        }

        .icono-ig {
            width: 80px;
            margin-top: 35px;
        }

        .firma {
            font-size: 34px;
            bottom: 15px;
            right: 15px;
        }
    }

</style>

</head>
<body>

<div class="overlay">

    <!-- LOGO -->
    <img src="LP-1.png" class="logo">

    <!-- TEXTO CENTRAL -->
    <div class="texto-central">
    
        <p>Para acceder al WiFi:</p>

    <ol>
        <li>Presiona el ícono de Instagram.</li>
        <li>Danos a seguir.</li>
        <li>Regresa y continúa con la conexión.</li>
    </ol>

        <!-- BOTÓN DE INSTAGRAM -->
        <a href="https://instagram.com/elfumadorcigar" target="_blank">
            <img src="IG.png" class="icono-ig">
        </a>
    </div>

    <!-- FIRMA PERSONAL -->
   <!--<div class="firma">Creative: @Hermy_Abreu</div> --> 

</div>

</body>
</html>
